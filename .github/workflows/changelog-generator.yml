name: Changelog generation

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'changelogs/**'
  workflow_dispatch: {}

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --no-save
      - name: Aggregate changelog
        run: npm run changelog:aggregate
      - name: Report generated changelog
        run: |
          echo "CHANGELOG.md generated. No commit/push is performed by this workflow."
